name: Keep Render Project Alive

on:
  schedule:
    # Runs every 12 minutes to beat Render's 15-minute spin-down timer
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allows you to trigger the job manually from the GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Health Endpoint
        run: |
          curl -fsS https://air-quality-mte7.onrender.com/health || echo "Ping failed or timed out"
